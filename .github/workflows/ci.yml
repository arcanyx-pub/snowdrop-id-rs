name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # All features that can be enabled together (sqlx-mysql-u64 is mutually
  # exclusive with sqlx-mysql, so --all-features cannot be used)
  FEATURES: snowdrop-id/serde,snowdrop-id/tokio,snowdrop-id/sqlx-postgres,snowdrop-id/sqlx-mysql,snowdrop-id/sqlx-sqlite

jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test (default features)
        run: cargo test --workspace
      - name: Test (all compatible features)
        run: cargo test --workspace --features "$FEATURES"

  lint:
    name: Rustfmt & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets --features "$FEATURES" -- -D warnings
      - name: Clippy (sqlx-mysql-u64 variant)
        run: cargo clippy -p snowdrop-id --all-targets --features sqlx-mysql-u64 -- -D warnings

  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --features "$FEATURES" --no-deps

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --features "$FEATURES"
