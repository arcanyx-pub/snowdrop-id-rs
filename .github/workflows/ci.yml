name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The Postgres integration tests skip without SNOWDROP_TEST_PG_URL; the
      # `postgres` job below runs them against every supported server version.
      - name: Test (default features)
        run: cargo test --workspace
      - name: Test (all features)
        run: cargo test --workspace --all-features

  postgres:
    name: Postgres ${{ matrix.postgres }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: ["14", "15", "16", "17", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SNOWDROP_TEST_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test snowdrop-id-postgres
        run: cargo test -p snowdrop-id-postgres

  lint:
    name: Rustfmt & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --all-features --no-deps

  msrv:
    name: MSRV (1.85, core features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      # The sqlx-backed features inherit sqlx 0.9's higher MSRV (1.94), and
      # sqlx is also an unconditional dev-dependency, so the crate's own
      # 1.85 floor is checked with core features and no test targets
      # (--all-targets would build dev-deps). snowdrop-id-postgres has its own
      # 1.94 MSRV (unconditional sqlx) and is excluded here.
      - run: cargo check --workspace --exclude snowdrop-id-postgres --features snowdrop-id/tokio,snowdrop-id/serde
